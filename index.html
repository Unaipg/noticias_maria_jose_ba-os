<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libertad Mª José Baños</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text:    #1a1a1a;
      --muted:   #6b7280;
      --border:  #e5e7eb;
      --accent:  #eb2525;
      --bg:      #ffffff;
      --surface: #f9fafb;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
    }

    /* ── Header ─────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      height: 480px;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,.55) 100%);
    }

    .hero-text {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(720px, 90%);
      color: #fff;
    }

    .hero-text .tag {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.75);
      margin-bottom: .6rem;
    }

    .hero-text h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 1px 6px rgba(0,0,0,.35);
    }

    .hero-text .byline {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: .85rem;
      color: rgba(255,255,255,.7);
      margin-top: .7rem;
    }

    /* ── Article body ────────────────────────────────── */
    article {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem 1.5rem 1.5rem;
    }

    article h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 2.5rem 0 .8rem;
      line-height: 1.3;
    }

    article h3 {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 2rem 0 .6rem;
      color: var(--muted);
    }

    article p {
      margin-bottom: 1.4rem;
      font-size: 1.05rem;
    }

    /* ── Blockquote ──────────────────────────────────── */
    blockquote {
      margin: 2rem 0;
      padding: 1.25rem 1.75rem;
      border-left: 4px solid var(--accent);
      background: var(--surface);
      border-radius: 0 8px 8px 0;
    }

    blockquote p {
      font-size: 1.15rem;
      font-style: italic;
      color: #374151;
      margin-bottom: .4rem;
    }

    blockquote cite {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: .8rem;
      font-style: normal;
      color: var(--muted);
    }

    /* ── Inline image ────────────────────────────────── */
    .post-image {
      margin: 2.5rem 0;
    }

    .post-image img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    .post-image figcaption {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: .8rem;
      color: var(--muted);
      text-align: center;
      margin-top: .6rem;
    }

    /* ── Gallery ─────────────────────────────────────── */
    .gallery {
      display: grid;
      gap: .6rem;
      margin: 2.5rem 0;
    }

    .gallery.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .gallery.cols-3 { grid-template-columns: repeat(3, 1fr); }

    .gallery img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      cursor: zoom-in;
      transition: opacity .2s;
    }

    .gallery img:hover { opacity: .88; }

    .gallery-caption {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: .8rem;
      color: var(--muted);
      text-align: center;
      grid-column: 1 / -1;
      margin-top: .2rem;
    }

    /* ── Lightbox ────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }

    /* ── Divider ─────────────────────────────────────── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }

    /* ── Lists ───────────────────────────────────────── */
    article ul, article ol {
      padding-left: 1.5rem;
      margin-bottom: 1.4rem;
    }

    article li {
      margin-bottom: .4rem;
      font-size: 1.05rem;
    }

    /* ── Standalone images inside articles ───────────── */
    article > img {
      width: 100%;
      border-radius: 10px;
      display: block;
      margin: 1.5rem 0;
    }

    /* ── Audio player ────────────────────────────────── */
    .audio-player {
      width: 100%;
      margin: 1.5rem 0;
      border-radius: 8px;
    }

    /* ── Page date ───────────────────────────────────── */
    .page-date {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Page content area ───────────────────────────── */
    #page-content {
      transition: opacity .15s ease;
      min-height: 12rem;
    }

    /* ── Pagination nav ──────────────────────────────── */
    .page-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem 1.5rem 3rem;
      border-top: 1px solid var(--border);
    }

    .nav-btn {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: .85rem;
      font-weight: 600;
      padding: .5rem 1.25rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      border-radius: 6px;
      transition: background .15s, border-color .15s;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--border);
    }

    .nav-btn:disabled {
      opacity: .35;
      cursor: default;
    }

    #nav-indicator {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: .8rem;
      color: var(--muted);
      min-width: 6rem;
      text-align: center;
    }

    /* ── Mobile ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .hero { height: 300px; }

      .hero-text { bottom: 1.5rem; }

      article {
        padding: 2rem 1.1rem 3rem;
      }

      article h2 { font-size: 1.3rem; }

      blockquote {
        padding: .9rem 1.1rem;
      }

      blockquote p { font-size: 1rem; }

      .gallery.cols-3 { grid-template-columns: 1fr; }
      .gallery.cols-2 { grid-template-columns: 1fr; }

      .page-nav { gap: .75rem; }
      .nav-btn { font-size: .78rem; padding: .45rem .9rem; }
    }
  </style>
</head>
<body>

  <!-- ── Hero header ─────────────────────────────────── -->
  <header class="hero">
    <img src="images/header.png"
         alt="Header image" />
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <p class="tag">Por la Amnistía Total</p>
      <h1>LIBERTAD Mª JOSÉ BAÑOS</h1>
      <!--<p class="byline">By Mariajo &nbsp;·&nbsp; March 2026</p>-->
    </div>
  </header>

  <!-- ── Page content (lazy-loaded) ─────────────────── -->
  <div id="page-content"></div>

  <!-- ── Pagination ─────────────────────────────────── -->
  <nav class="page-nav">
    <button id="nav-prev" class="nav-btn" disabled>← Actualización anterior</button>
    <span id="nav-indicator"></span>
    <button id="nav-next" class="nav-btn" disabled>Actualización siguiente →</button>
  </nav>

  <!-- ── Lightbox ─────────────────────────────────────── -->
  <div id="lightbox">
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

  <script>
    /*
     * PÁGINAS
     * Ordenadas de más antigua (índice 0) a más reciente (último índice).
     * Para añadir una nueva actualización crea pages/ddmmyy.html y añádela al final:
     *   { date: '100426', file: 'pages/100426.html' },
     */
    const PAGES = [
      { date: '020426', file: 'pages/020426.html' },
      { date: '040426', file: 'pages/040426.html' },
      { date: '060426', file: 'pages/060426.html' },
    ];

    const container = document.getElementById('page-content');
    const prevBtn   = document.getElementById('nav-prev');
    const nextBtn   = document.getElementById('nav-next');
    const indicator = document.getElementById('nav-indicator');
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lightbox-img');

    const cache = {};
    let current = PAGES.length - 1; // start at the most recent page

    function initLightbox() {
      container.querySelectorAll('.gallery img').forEach(img => {
        img.addEventListener('click', () => {
          lbImg.src = img.src;
          lbImg.alt = img.alt;
          lightbox.classList.add('open');
        });
      });
    }

    lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') lightbox.classList.remove('open');
    });

    function updateNav() {
      const total = PAGES.length;
      const humanIndex = total - current; // newest = 1, oldest = total
      indicator.textContent = `Actualización ${humanIndex} / ${total}`;
      prevBtn.disabled = current <= 0;
      nextBtn.disabled = current >= PAGES.length - 1;
    }

    async function showPage(index, { pushHistory = true } = {}) {
      if (!cache[index]) {
        container.style.opacity = '.35';
        try {
          const res = await fetch(PAGES[index].file);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          cache[index] = await res.text();
        } catch (err) {
          container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:4rem 1.5rem;">Error al cargar la actualización.</p>';
          container.style.opacity = '1';
          return;
        }
      }

      container.innerHTML = cache[index];
      container.style.opacity = '1';
      current = index;

      initLightbox();

      if (window.twttr && twttr.widgets) {
        twttr.widgets.load(container);
      }

      updateNav();

      // Update URL hash so the page is directly linkable (#1 = oldest, #N = newest)
      if (pushHistory) {
        history.pushState({ index }, '', '#' + PAGES[index].date);
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    prevBtn.addEventListener('click', () => showPage(current - 1));
    nextBtn.addEventListener('click', () => showPage(current + 1));

    // Back/forward browser navigation
    window.addEventListener('popstate', e => {
      const index = e.state?.index ?? PAGES.length - 1;
      showPage(index, { pushHistory: false });
    });

    // Resolve initial page from hash, defaulting to most recent
    const hashDate   = location.hash.slice(1);
    const hashIndex  = PAGES.findIndex(p => p.date === hashDate);
    const startIndex = hashIndex !== -1 ? hashIndex : PAGES.length - 1;
    showPage(startIndex);
  </script>

</body>
</html>
